workflows:
  ios-workflow:
    name: iOS TestFlight
    max_build_duration: 60
    environment:
      vars:
        XCODE_WORKSPACE: "ios/BtRemoteLogger.xcworkspace"
        XCODE_SCHEME: "BtRemoteLogger"
        BUNDLE_ID: "com.moaddiapp.btremotelogger"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.moaddiapp.btremotelogger
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
